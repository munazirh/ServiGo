services:
  - type: web
    name: servigo-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # Set this in Render dashboard to your MongoDB Atlas connection string.
      - key: MONGO_URI
value: "mongodb+srv://servigoUser:Munazir123@cluster0.ucmzqtu.mongodb.net/?appName=Cluster0"
      - key: NODE_ENV
        value: production
        # Add JWT_SECRET, EMAIL_PASS etc. manually in Render dashboard
    autoDeploy: true
